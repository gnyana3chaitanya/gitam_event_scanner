<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GITAM Event Scanner</title>

    <link rel="stylesheet" href="style.css">

    <!-- QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode" defer></script>

    <script src="script.js" defer></script>

</head>

<body>

    <div class="container">

        <h1>🎓 GITAM Event Scanner</h1>

        <p>Scan the student's QR Code</p>

        <button id="start-btn">
            Start Scanner
        </button>

        <div id="reader"></div>

        <div id="result">

            Waiting to scan...

        </div>

    </div>

</body>

</html>
